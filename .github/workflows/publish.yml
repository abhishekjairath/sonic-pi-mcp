# npm publish when a GitHub Release is published; release tag must match package.json version.

name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14"
          registry-url: https://registry.npmjs.org

      - name: Use npm version with trusted publishing support
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag matches package.json
        run: |
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag $TAG (expected $TAG_VERSION)"
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
